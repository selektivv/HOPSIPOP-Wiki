      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQBAMAAADt3eJSAAAAHlBMVEUAAAD9/6ja4uLg4nfL1ta5ycnS0gCIpKRkkJBVa2uOynhjAAAAAXRSTlMAQObYZgAAAEpJREFUeNpjwA4aoDRHJZTRrj4BwmgVhTA6SkQqQSyOUhcR10qQCkXBZMHwCSARV9NwsL6ZJaKVENVTxaHap7tDGZyVDFAwAdliAFlNENjnSBVaAAAAAElFTkSuQmCC" x="739.5" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="739.5" y="214" class="label">REWARD</text>
      <text x="739.5" y="237" class="title"><tspan x="739.5" dy="0">Receive Three</tspan></text>
      <text x="739.5" y="270" class="body"><tspan x="739.5" dy="0">The bonus applies only to you.</tspan></text>
    </g>
