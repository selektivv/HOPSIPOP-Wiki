<svg xmlns="http://www.w3.org/2000/svg" width="964" height="360" viewBox="0 0 964 360">
    <defs>
      <linearGradient id="background" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#111920"/><stop offset="1" stop-color="#10151a"/></linearGradient>
      <linearGradient id="cardGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#172128"/><stop offset="1" stop-color="#121a20"/></linearGradient>
      <style>
        text{font-family:'Segoe UI',Arial,sans-serif}.hero{font-size:26px;font-weight:700;fill:#eff6f5}.subtitle{font-size:13px;fill:#9fb2b6}.category{font-size:9px;font-weight:800;letter-spacing:1.6px;fill:#759095}.label{font-size:9px;font-weight:800;letter-spacing:1.4px;fill:#91adaa}.title{font-size:17px;font-weight:700;fill:#e8f0ef}.body{font-size:12.5px;fill:#a9b9bc}
      </style>
    </defs>
    <rect width="964" height="360" fill="url(#background)"/>
    <text x="26" y="34" class="category">COUNTER BOOST</text>
    <text x="26" y="68" class="hero">Using a Counter Boost</text>
    <text x="26" y="94" class="subtitle">The voucher changes your reward, not the block goal.</text>
    <line x1="26" y1="112" x2="938" y2="112" stroke="#2a3a42"/>
    <g>
      <rect x="26" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="26" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAMAAAAoLQ9TAAAAFVBMVEUAAACurq7W1tbp6uv8/PLBwcGHh4cmBvGHAAAAAXRSTlMAQObYZgAAAEZJREFUeNqVjzkSgDAMA3U4+v+TGQJMHCrYTrtujB+Qr21xy6oyW64TZeULZm65bsRsuzwv8hgrQDNOgGU8gkU0EnSS7z8eqkoBXX1zFmAAAAAASUVORK5CYII=" x="42" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="42" y="214" class="label">ACTIVATE</text>
      <text x="42" y="237" class="title"><tspan x="42" dy="0">Use the Voucher</tspan></text>
      <text x="42" y="270" class="body"><tspan x="42" dy="0">Hold it and right-click.</tspan></text>
    </g><g>
      <rect x="258.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="258.5" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64," x="274.5" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="274.5" y="214" class="label">DURATION</text>
      <text x="274.5" y="237" class="title"><tspan x="274.5" dy="0">Watch the Timer</tspan></text>
      <text x="274.5" y="270" class="body"><tspan x="274.5" dy="0">Time continues offline and</tspan><tspan x="274.5" dy="17">outside.</tspan></text>
    </g><g>
      <rect x="491" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="491" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQBAMAAADt3eJSAAAAHlBMVEUAAAAz68srx6wnspqJZydoTh5JNhUOPzYoHgsIJSBDqdTeAAAAAXRSTlMAQObYZgAAAEVJREFUeNpjwArKywvANLuQsXoqmFU509gDKplkCaHZIowmgBkpDZMnQAQYgAywAMOkCRABhokTIAIMnFABqBYoowPNZgA7zw9D/CrJmgAAAABJRU5ErkJggg==" x="507" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="507" y="214" class="label">COMPLETE</text>
      <text x="507" y="237" class="title"><tspan x="507" dy="0">Finish a Counter</tspan></text>
      <text x="507" y="270" class="body"><tspan x="507" dy="0">The required goal stays</tspan><tspan x="507" dy="17">unchanged.</tspan></text>
    </g><g>
      <rect x="723.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
