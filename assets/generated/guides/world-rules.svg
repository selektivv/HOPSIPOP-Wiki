      <text x="739.5" y="214" class="label">LAND</text>
      <text x="739.5" y="237" class="title"><tspan x="739.5" dy="0">No Claims</tspan></text>
      <text x="739.5" y="270" class="body"><tspan x="739.5" dy="0">Land protection cannot be</tspan><tspan x="739.5" dy="17">created.</tspan></text>
    </g>
  </svg>