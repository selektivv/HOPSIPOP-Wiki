      <text x="42" y="214" class="label">COMBAT</text>
      <text x="42" y="237" class="title"><tspan x="42" dy="0">PvP Enabled</tspan></text>
      <text x="42" y="270" class="body"><tspan x="42" dy="0">Other players can attack you.</tspan></text>
    </g><g>
      <rect x="258.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="258.5" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAMAAAAoLQ9TAAAAHlBMVEUAAAD9++747qXq24TRp11B5n/Fh0IAu0agWyOFQA8RGs9sAAAAAXRSTlMAQObYZgAAAF1JREFUeNptzkkOwDAMAsDYEGr+/+FK6RJXKjfPATz+UyvtxsoWIyIT3kAmyAYxyZgN5hE5jwZigvKetAD5ni7QoERZV69dGQmw7PcxklQrrRWPLZTk8QV6dPFTeAJoLQLslSF6LQAAAABJRU5ErkJggg==" x="274.5" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="274.5" y="214" class="label">INVENTORY</text>
      <text x="274.5" y="237" class="title"><tspan x="274.5" dy="0">Keep Inventory</tspan></text>
      <text x="274.5" y="270" class="body"><tspan x="274.5" dy="0">Your carried items stay on</tspan><tspan x="274.5" dy="17">death.</tspan></text>
    </g><g>
      <rect x="491" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="491" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64," x="507" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="507" y="214" class="label">TEMPORARY</text>
      <text x="507" y="237" class="title"><tspan x="507" dy="0">Ten-Hour World</tspan></text>
      <text x="507" y="270" class="body"><tspan x="507" dy="0">Terrain and builds are</tspan><tspan x="507" dy="17">recreated.</tspan></text>
    </g><g>
      <rect x="723.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
