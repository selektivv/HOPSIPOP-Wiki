      <text x="274.5" y="237" class="title"><tspan x="274.5" dy="0">Remove Valuables</tspan></text>
      <text x="274.5" y="270" class="body"><tspan x="274.5" dy="0">Placed containers are deleted.</tspan></text>
    </g><g>
      <rect x="491" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
