      <text x="739.5" y="237" class="title"><tspan x="739.5" dy="0">New Terrain</tspan></text>
      <text x="739.5" y="270" class="body"><tspan x="739.5" dy="0">Counters and co-op groups</tspan><tspan x="739.5" dy="17">reset.</tspan></text>
