<svg xmlns="http://www.w3.org/2000/svg" width="964" height="360" viewBox="0 0 964 360">
    <defs>
      <linearGradient id="background" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#111920"/><stop offset="1" stop-color="#10151a"/></linearGradient>
      <linearGradient id="cardGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#172128"/><stop offset="1" stop-color="#121a20"/></linearGradient>
      <style>
        text{font-family:'Segoe UI',Arial,sans-serif}.hero{font-size:26px;font-weight:700;fill:#eff6f5}.subtitle{font-size:13px;fill:#9fb2b6}.category{font-size:9px;font-weight:800;letter-spacing:1.6px;fill:#759095}.label{font-size:9px;font-weight:800;letter-spacing:1.4px;fill:#91adaa}.title{font-size:17px;font-weight:700;fill:#e8f0ef}.body{font-size:12.5px;fill:#a9b9bc}
      </style>
    </defs>
    <rect width="964" height="360" fill="url(#background)"/>
    <text x="26" y="34" class="category">COUNTERS</text>
    <text x="26" y="68" class="hero">From Blocks to Capacity</text>
    <text x="26" y="94" class="subtitle">Eligible mining progress repeats every time the goal is reached.</text>
    <line x1="26" y1="112" x2="938" y2="112" stroke="#2a3a42"/>
    <g>
      <rect x="26" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="26" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64," x="42" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="42" y="214" class="label">MINE</text>
      <text x="42" y="237" class="title"><tspan x="42" dy="0">Eligible Blocks</tspan></text>
      <text x="42" y="270" class="body"><tspan x="42" dy="0">Normal breaks usually add one</tspan><tspan x="42" dy="17">point.</tspan></text>
    </g><g>
      <rect x="258.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="258.5" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAMAAAAoLQ9TAAAAFVBMVEUAAACurq7W1tbp6uv8/PLBwcGHh4cmBvGHAAAAAXRSTlMAQObYZgAAAEZJREFUeNqVjzkSgDAMA3U4+v+TGQJMHCrYTrtujB+Qr21xy6oyW64TZeULZm65bsRsuzwv8hgrQDNOgGU8gkU0EnSS7z8eqkoBXX1zFmAAAAAASUVORK5CYII=" x="274.5" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="274.5" y="214" class="label">TRACK</text>
      <text x="274.5" y="237" class="title"><tspan x="274.5" dy="0">Watch the Counter</tspan></text>
      <text x="274.5" y="270" class="body"><tspan x="274.5" dy="0">The action bar shows current</tspan><tspan x="274.5" dy="17">progress.</tspan></text>
    </g><g>
      <rect x="491" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="491" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQBAMAAADt3eJSAAAAHlBMVEUAAAD9/6ja4uLg4nfL1ta5ycnS0gCIpKRkkJBVa2uOynhjAAAAAXRSTlMAQObYZgAAAEpJREFUeNpjwA4aoDRHJZTRrj4BwmgVhTA6SkQqQSyOUhcR10qQCkXBZMHwCSARV9NwsL6ZJaKVENVTxaHap7tDGZyVDFAwAdliAFlNENjnSBVaAAAAAElFTkSuQmCC" x="507" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="507" y="214" class="label">REWARD</text>
      <text x="507" y="237" class="title"><tspan x="507" dy="0">Reach the Goal</tspan></text>
      <text x="507" y="270" class="body"><tspan x="507" dy="0">The default target is ten</tspan><tspan x="507" dy="17">points.</tspan></text>
    </g><g>
      <rect x="723.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="723.5" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQBAMAAADt3eJSAAAAHlBMVEUAAAAz68srx6wnspqJZydoTh5JNhUOPzYoHgsIJSBDqdTeAAAAAXRSTlMAQObYZgAAAEVJREFUeNpjwArKywvANLuQsXoqmFU509gDKplkCaHZIowmgBkpDZMnQAQYgAywAMOkCRABhokTIAIMnFABqBYoowPNZgA7zw9D/CrJmgAAAABJRU5ErkJggg==" x="739.5" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="739.5" y="214" class="label">REPEAT</text>
      <text x="739.5" y="237" class="title"><tspan x="739.5" dy="0">Start Again</tspan></text>
      <text x="739.5" y="270" class="body"><tspan x="739.5" dy="0">Extra points do not carry</tspan><tspan x="739.5" dy="17">over.</tspan></text>
    </g>
  </svg>