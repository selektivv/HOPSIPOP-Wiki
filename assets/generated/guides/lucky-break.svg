      <text x="42" y="214" class="label">MANUAL ONLY</text>
      <text x="42" y="237" class="title"><tspan x="42" dy="0">Mine an Eligible Block</tspan></text>
      <text x="42" y="270" class="body"><tspan x="42" dy="0">Chunk Drills never trigger the</tspan><tspan x="42" dy="17">effect.</tspan></text>
    </g><g>
      <rect x="258.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="258.5" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQBAMAAADt3eJSAAAAElBMVEUAAADYsoHHnme0i1uCYEFlTjlr5w3fAAAAAXRSTlMAQObYZgAAAERJREFUeNpjwAFcoDSLcQCUoSgKZQiqQmgnRVOwSkdlJVOwAkEhI5BiZ0FFJbAuV0UhZbCSUBUlU7AxrCYgGiwUgN1eAPgjCBJuhUG0AAAAAElFTkSuQmCC" x="274.5" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="274.5" y="214" class="label">ROLL</text>
      <text x="274.5" y="237" class="title"><tspan x="274.5" dy="0">Trigger the Chance</tspan></text>
      <text x="274.5" y="270" class="body"><tspan x="274.5" dy="0">Each purchased level improves</tspan><tspan x="274.5" dy="17">the odds.</tspan></text>
    </g><g>
      <rect x="491" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="491" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAMAAAAoLQ9TAAAAFVBMVEUAAACurq7W1tbp6uv8/PLBwcGHh4cmBvGHAAAAAXRSTlMAQObYZgAAAEZJREFUeNqVjzkSgDAMA3U4+v+TGQJMHCrYTrtujB+Qr21xy6oyW64TZeULZm65bsRsuzwv8hgrQDNOgGU8gkU0EnSS7z8eqkoBXX1zFmAAAAAASUVORK5CYII=" x="507" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="507" y="214" class="label">PROGRESS</text>
      <text x="507" y="237" class="title"><tspan x="507" dy="0">Gain One to Five</tspan></text>
      <text x="507" y="270" class="body"><tspan x="507" dy="0">The result replaces the normal</tspan><tspan x="507" dy="17">point.</tspan></text>
    </g><g>
      <rect x="723.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="723.5" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAXElEQVR42q2TyQ0AIAgEsf9qbMBmLMTjReLBEIVkf8zsByR0SkqtipiZO0dYlzh5ZG3GhjlXCcDrzlUAsBYYAoZBADAJAGYBwCwAmAVeWAX/h6STH095k3gS+sEdGgfXopZkuo0AAAAASUVORK5CYII=" x="739.5" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="739.5" y="214" class="label">LIMIT</text>
      <text x="739.5" y="237" class="title"><tspan x="739.5" dy="0">No Overflow</tspan></text>
      <text x="739.5" y="270" class="body"><tspan x="739.5" dy="0">Progress past the goal is</tspan><tspan x="739.5" dy="17">discarded.</tspan></text>
    </g>
  </svg>