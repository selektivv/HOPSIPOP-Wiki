      <text x="42" y="214" class="label">OPEN</text>
      <text x="42" y="237" class="title"><tspan x="42" dy="0">Use /cw</tspan></text>
      <text x="42" y="270" class="body"><tspan x="42" dy="0">Open the Capacity World menu.</tspan></text>
    </g><g>
      <rect x="258.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="258.5" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAWElEQVQ4y2N4uVH0/6fdXmD8/24UGMP4IDkGQgCkcFWb8v+ebN7/1XEQDGKDxEByRBmArBnZEKIMADkZpgnEBjkbmU+SAbDwIMkAir1AcSBSHI2jYBQAAQAWA56MGfTNfQAAAABJRU5ErkJggg==" x="274.5" y="151" width="44" height="44" image-rendering="pixelated"/>
