      <text x="739.5" y="214" class="label">RESULT</text>
      <text x="739.5" y="237" class="title"><tspan x="739.5" dy="0">Cleaner Chat</tspan></text>
      <text x="739.5" y="270" class="body"><tspan x="739.5" dy="0">A change starts a fresh</tspan><tspan x="739.5" dy="17">message count.</tspan></text>
