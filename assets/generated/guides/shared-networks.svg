      <text x="274.5" y="270" class="body"><tspan x="274.5" dy="0">Select the owner&#39;s network.</tspan></text>
    </g><g>
      <rect x="491" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="491" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/svg+xml;base64," x="507" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="507" y="214" class="label">VERIFY</text>
      <text x="507" y="237" class="title"><tspan x="507" dy="0">Check the Owner</tspan></text>
      <text x="507" y="270" class="body"><tspan x="507" dy="0">Capacity and jobs belong to</tspan><tspan x="507" dy="17">them.</tspan></text>
    </g><g>
      <rect x="723.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
