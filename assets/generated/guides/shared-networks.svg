      <text x="42" y="237" class="title"><tspan x="42" dy="0">Grant Access</tspan></text>
      <text x="42" y="270" class="body"><tspan x="42" dy="0">Use /mc invite with a player.</tspan></text>
    </g><g>
      <rect x="258.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="258.5" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
