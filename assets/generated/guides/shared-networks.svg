      <text x="739.5" y="214" class="label">REVOKE</text>
      <text x="739.5" y="237" class="title"><tspan x="739.5" dy="0">Remove Access</tspan></text>
      <text x="739.5" y="270" class="body"><tspan x="739.5" dy="0">Use /mc uninvite when needed.</tspan></text>
