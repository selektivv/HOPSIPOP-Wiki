      </style>
    </defs>
    <rect width="964" height="360" fill="url(#background)"/>
    <text x="26" y="34" class="category">AUTOMATION</text>
    <text x="26" y="68" class="hero">Build an Automation Job</text>
    <text x="26" y="94" class="subtitle">Configure one repeatable process inside a single storage network.</text>
    <line x1="26" y1="112" x2="938" y2="112" stroke="#2a3a42"/>
