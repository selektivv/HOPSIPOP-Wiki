      <text x="42" y="214" class="label">ACCESS</text>
      <text x="42" y="237" class="title"><tspan x="42" dy="0">Place a Master Chest</tspan></text>
      <text x="42" y="270" class="body"><tspan x="42" dy="0">Chunks must remain loaded.</tspan></text>
    </g><g>
      <rect x="258.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="258.5" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAMAAAAoLQ9TAAAAFVBMVEU/PkJJSEhPT09ZWFhnYWEtLTI0NDhHtSwOAAAAV0lEQVR42gXBsWGEABAEMQ1vrv96SdZSfxNgTf1MAOgRa41YoQaZ9TBAaxQA0AthWuaOAwdXTEDmmefJFrW93YfAOB0A4PcAAILz4fhazpcd3+HrBQD8AxiwIV6SD/zZAAAAAElFTkSuQmCC" x="274.5" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="274.5" y="214" class="label">INPUT</text>
      <text x="274.5" y="237" class="title"><tspan x="274.5" dy="0">Feed from Above or Side</tspan></text>
      <text x="274.5" y="270" class="body"><tspan x="274.5" dy="0">Buffered items are absorbed.</tspan></text>
    </g><g>
      <rect x="491" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="491" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAMAAAAoLQ9TAAAAG1BMVEVQTk6RkZGFhYV3d3doaGhdW1s8OzshISEQEBD7vy5OAAAAdUlEQVR42gXBgWGDQAwAMZ2hv/+8ScCVwME5xznkb21vWel7s+9tevay1tjt9+ut9xkZSyO0Op0nAs+o3I+74Lvu75wtVdl6zyBgyWc+LLv7kpHLzrvoYuc6MFt55/EbphrpeibzYXqmSrhl354LkeB8OPjgH5llNWSoxyjEAAAAAElFTkSuQmCC" x="507" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="507" y="214" class="label">OUTPUT</text>
      <text x="507" y="237" class="title"><tspan x="507" dy="0">Pull from Below</tspan></text>
      <text x="507" y="270" class="body"><tspan x="507" dy="0">Unfiltered output selects</tspan><tspan x="507" dy="17">arbitrary items.</tspan></text>
    </g><g>
      <rect x="723.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="723.5" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64," x="739.5" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="739.5" y="214" class="label">FILTER</text>
      <text x="739.5" y="237" class="title"><tspan x="739.5" dy="0">Choose One Item</tspan></text>
      <text x="739.5" y="270" class="body"><tspan x="739.5" dy="0">Nova rank and an Item Frame</tspan><tspan x="739.5" dy="17">are required.</tspan></text>
    </g>
  </svg>