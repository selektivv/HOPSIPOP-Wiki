      <text x="42" y="214" class="label">NORMAL</text>
      <text x="42" y="237" class="title"><tspan x="42" dy="0">One Capacity</tspan></text>
      <text x="42" y="270" class="body"><tspan x="42" dy="0">The standard reward for one</tspan><tspan x="42" dy="17">goal.</tspan></text>
    </g><g>
      <rect x="258.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="258.5" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64," x="274.5" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="274.5" y="214" class="label">BOOSTED</text>
      <text x="274.5" y="237" class="title"><tspan x="274.5" dy="0">Three Capacity</tspan></text>
      <text x="274.5" y="270" class="body"><tspan x="274.5" dy="0">Only the boosted player gets</tspan><tspan x="274.5" dy="17">three.</tspan></text>
    </g><g>
      <rect x="491" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="491" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/svg+xml;base64," x="507" y="151" width="44" height="44" image-rendering="pixelated"/>
      <text x="507" y="214" class="label">CO-OP</text>
      <text x="507" y="237" class="title"><tspan x="507" dy="0">Reward Every Member</tspan></text>
      <text x="507" y="270" class="body"><tspan x="507" dy="0">Active members receive the</tspan><tspan x="507" dy="17">shared result.</tspan></text>
    </g><g>
      <rect x="723.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
