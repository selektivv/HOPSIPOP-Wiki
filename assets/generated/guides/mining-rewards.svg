      <text x="739.5" y="214" class="label">PROGRESS</text>
      <text x="739.5" y="237" class="title"><tspan x="739.5" dy="0">Storage &amp; Ranks</tspan></text>
      <text x="739.5" y="270" class="body"><tspan x="739.5" dy="0">Rewards immediately raise</tspan><tspan x="739.5" dy="17">both.</tspan></text>
    </g>
  </svg>