<svg xmlns="http://www.w3.org/2000/svg" width="964" height="360" viewBox="0 0 964 360">
    <defs>
      <linearGradient id="background" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#111920"/><stop offset="1" stop-color="#10151a"/></linearGradient>
      <linearGradient id="cardGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#172128"/><stop offset="1" stop-color="#121a20"/></linearGradient>
      <style>
        text{font-family:'Segoe UI',Arial,sans-serif}.hero{font-size:26px;font-weight:700;fill:#eff6f5}.subtitle{font-size:13px;fill:#9fb2b6}.category{font-size:9px;font-weight:800;letter-spacing:1.6px;fill:#759095}.label{font-size:9px;font-weight:800;letter-spacing:1.4px;fill:#91adaa}.title{font-size:17px;font-weight:700;fill:#e8f0ef}.body{font-size:12.5px;fill:#a9b9bc}
      </style>
    </defs>
    <rect width="964" height="360" fill="url(#background)"/>
    <text x="26" y="34" class="category">CLAIMS</text>
    <text x="26" y="68" class="hero">Create or Resize a Claim</text>
    <text x="26" y="94" class="subtitle">Select boundaries, pay only for area, and keep within the rules.</text>
    <line x1="26" y1="112" x2="938" y2="112" stroke="#2a3a42"/>
    <g>
