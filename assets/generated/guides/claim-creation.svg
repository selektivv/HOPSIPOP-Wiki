      <text x="42" y="237" class="title"><tspan x="42" dy="0">Hold the Shovel</tspan></text>
      <text x="42" y="270" class="body"><tspan x="42" dy="0">Right-click two opposite</tspan><tspan x="42" dy="17">corners.</tspan></text>
    </g><g>
      <rect x="258.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
