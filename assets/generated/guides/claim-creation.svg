      <text x="739.5" y="237" class="title"><tspan x="739.5" dy="0">Inspect &amp; Resize</tspan></text>
      <text x="739.5" y="270" class="body"><tspan x="739.5" dy="0">Move a corner or use</tspan><tspan x="739.5" dy="17">/expandclaim.</tspan></text>
