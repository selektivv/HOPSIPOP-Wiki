      <text x="507" y="237" class="title"><tspan x="507" dy="0">Use Capacity</tspan></text>
      <text x="507" y="270" class="body"><tspan x="507" dy="0">One horizontal block costs</tspan><tspan x="507" dy="17">one.</tspan></text>
    </g><g>
      <rect x="723.5" y="132" width="214.5" height="190" fill="url(#cardGradient)" stroke="#293942"/>
      <rect x="723.5" y="132" width="214.5" height="2" fill="#83a7a5" opacity=".8"/>
      <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMElEQVR42mMYmsDTTPS/hhz3f7I1d6argw2gv+YMP7lRm4ejzZRrRgCQRhCme8YCAIbcOys8RSL/AAAAAElFTkSuQmCC" x="739.5" y="151" width="44" height="44" image-rendering="pixelated"/>
